on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.0

      - name: Build
        run: ./scripts/buildprod.sh

  job_id:
    name: GCP Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/473389473601/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
          service_account: 'cloud-run-deployer@notely-496523.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          version: '>= 363.0.0'
          project_id: 'notely-496523'

      - name: 'Build and Push Docker Image'
        run: 'gcloud builds submit --tag us-central1-docker.pkg.dev/notely-496523/notely-ar-repo/notely:latest .'
      